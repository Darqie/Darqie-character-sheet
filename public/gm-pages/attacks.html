<section class="gm-characters-page gm-items-page">
	<div class="gm-characters-toolbar">
		<div class="gm-characters-toolbar-title">Атаки</div>
		<div class="gm-characters-toolbar-actions">
			<select id="gmAttacksFilterSelect" class="gm-cell-select gm-items-filter-select"></select>
			<button id="gmAddAttackButton" class="gm-characters-create-btn" type="button">
				<i class="fas fa-plus"></i>
				<span>Додати атаку</span>
			</button>
		</div>
	</div>

	<div class="gm-characters-table-wrap">
		<table class="gm-characters-table gm-items-table">
			<colgroup>
				<col style="width: 34%" />
				<col style="width: 12%" />
				<col style="width: 14%" />
				<col style="width: 24%" />
				<col />
			</colgroup>
			<thead>
				<tr>
					<th>Назва</th>
					<th>Бонус</th>
					<th>Шкода</th>
					<th>Персонаж</th>
					<th>Дії</th>
				</tr>
			</thead>
			<tbody id="gmAttacksTableBody"></tbody>
		</table>
	</div>

	<div id="gmAttackCreateModal" class="gm-item-modal" hidden>
		<div class="gm-item-modal-backdrop" data-action="closeModal"></div>
		<div class="gm-item-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="gmAttackCreateModalTitle">
			<h4 id="gmAttackCreateModalTitle" class="gm-item-modal-title">Додати атаку</h4>
			<div class="gm-item-modal-grid">
				<label class="gm-item-modal-label">
					<span>Назва</span>
					<input id="gmAttackModalNameInput" class="gm-cell-input" type="text" />
				</label>
				<label class="gm-item-modal-label">
					<span>Бонус</span>
					<input id="gmAttackModalBonusInput" class="gm-cell-input" type="text" value="+0" />
				</label>
				<label class="gm-item-modal-label">
					<span>Шкода</span>
					<input id="gmAttackModalDamageInput" class="gm-cell-input" type="text" value="1d6" />
				</label>
				<label class="gm-item-modal-label">
					<span>Персонаж</span>
					<select id="gmAttackModalOwnerSelect" class="gm-cell-select"></select>
				</label>
			</div>
			<div class="gm-item-modal-actions">
				<button id="gmAttackModalSaveButton" type="button" class="gm-characters-create-btn">
					<i class="fas fa-check"></i>
					<span>Зберегти</span>
				</button>
				<button id="gmAttackModalCancelButton" type="button" class="gm-characters-create-btn gm-characters-create-btn--npc">
					<i class="fas fa-times"></i>
					<span>Скасувати</span>
				</button>
			</div>
		</div>
	</div>
</section>
