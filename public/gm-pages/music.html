<section class="gm-characters-page gm-items-page gm-music-page">
  <style>
    .gm-music-page .gm-music-toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .gm-music-page .gm-music-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      margin-bottom: 8px;
    }

    .gm-music-page .gm-music-controls-left,
    .gm-music-page .gm-music-controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .gm-music-page .gm-music-btn {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: #f0f0f0;
      border-radius: 7px;
      padding: 6px 10px;
      cursor: pointer;
      font-family: 'Cormorant Unicase', serif;
      font-size: 0.95rem;
    }

    .gm-music-page .gm-music-btn.is-active {
      border-color: rgba(130, 255, 182, 0.6);
      background: rgba(54, 176, 98, 0.28);
    }

    .gm-music-page .gm-music-volume-wrap {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 0.9rem;
      opacity: 0.92;
    }

    .gm-music-page .gm-music-volume-wrap input[type="range"] {
      width: 135px;
    }

    .gm-music-page .gm-music-seek-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .gm-music-page .gm-music-seek-wrap input[type="range"] {
      flex: 1;
      min-width: 140px;
    }

    .gm-music-page .gm-music-now-playing {
      margin: 6px 0 8px;
      font-size: 0.92rem;
      opacity: 0.92;
      min-height: 20px;
    }

    .gm-music-page .gm-music-hint {
      margin-bottom: 8px;
      opacity: 0.75;
      font-size: 0.84rem;
    }

    .gm-music-page .gm-music-table input.gm-cell-input {
      width: 100%;
    }

    .gm-music-page .gm-music-actions {
      display: flex;
      gap: 4px;
      justify-content: center;
      align-items: center;
    }

    .gm-music-page .gm-music-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .gm-music-page .gm-music-modal.is-open {
      display: flex;
    }

    .gm-music-page .gm-music-modal-card {
      width: min(560px, 100%);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(18, 20, 28, 0.96);
      padding: 12px;
    }

    .gm-music-page .gm-music-modal-title {
      font-size: 1rem;
      margin-bottom: 10px;
      opacity: 0.95;
    }

    .gm-music-page .gm-music-modal-grid {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .gm-music-page .gm-music-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>

  <div class="gm-music-toolbar">
    <div class="gm-characters-toolbar-title">Музика</div>
    <button id="gmMusicOpenAddModalButton" class="gm-characters-create-btn" type="button">
      <i class="fas fa-plus"></i>
      <span>Додати трек</span>
    </button>
  </div>

  <div class="gm-music-controls">
    <div class="gm-music-controls-left">
      <button id="gmMusicPrevButton" class="gm-music-btn" type="button" title="Попередній"><i class="fas fa-backward"></i></button>
      <button id="gmMusicPlayPauseButton" class="gm-music-btn" type="button" title="Пуск / Пауза"><i class="fas fa-play"></i></button>
      <button id="gmMusicNextButton" class="gm-music-btn" type="button" title="Наступний"><i class="fas fa-forward"></i></button>
      <button id="gmMusicRepeatButton" class="gm-music-btn" type="button" title="Повтор"><i class="fas fa-redo"></i></button>
    </div>
    <div class="gm-music-controls-right">
      <label class="gm-music-volume-wrap">
        <span>Гучність для всіх</span>
        <input id="gmMusicGlobalVolumeSlider" type="range" min="0" max="100" step="1" />
        <span id="gmMusicGlobalVolumeValue">100%</span>
      </label>
      <label class="gm-music-volume-wrap">
        <span>Гучність GM</span>
        <input id="gmMusicVolumeSlider" type="range" min="0" max="100" step="1" />
        <span id="gmMusicVolumeValue">70%</span>
      </label>
    </div>
  </div>

  <div class="gm-music-seek-wrap">
    <span>Перемотка</span>
    <input id="gmMusicSeekSlider" type="range" min="0" max="100" step="1" value="0" />
    <span id="gmMusicSeekValue">0:00</span>
  </div>

  <div id="gmMusicNowPlaying" class="gm-music-now-playing">Трек не вибрано</div>
  <div id="gmMusicYoutubeWrap" style="display:none; margin-bottom:8px; border-radius:6px; overflow:hidden; line-height:0; position:relative;">
    <iframe id="gmMusicYoutubeIframe"
      style="display:block; width:100%; aspect-ratio:16/9; max-height:160px; border:0;"
      allow="autoplay; encrypted-media; fullscreen"
      allowfullscreen
    ></iframe>
    <button id="gmMusicYoutubeUnmuteBtn" type="button" style="display:none; position:absolute; bottom:8px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:20px; padding:6px 16px; cursor:pointer; font-size:13px; z-index:10; white-space:nowrap;">🔊 Увімкнути звук</button>
  </div>
  <div class="gm-music-hint">YouTube відтворюється у вбудованому плеєрі. Якщо звуку немає — натисніть «🔊 Увімкнути звук».</div>
  <audio id="gmMusicAudioPlayer" preload="none" style="display:none;"></audio>

  <div class="gm-characters-table-wrap">
    <table class="gm-characters-table gm-music-table">
      <colgroup>
        <col style="width: 34%" />
        <col style="width: 44%" />
        <col style="width: 10%" />
        <col style="width: 12%" />
      </colgroup>
      <thead>
        <tr>
          <th>Назва</th>
          <th>Посилання</th>
          <th>Тип</th>
          <th>Дії</th>
        </tr>
      </thead>
      <tbody id="gmMusicTableBody"></tbody>
    </table>
  </div>

  <div id="gmMusicAddModal" class="gm-music-modal" aria-hidden="true">
    <div class="gm-music-modal-card" role="dialog" aria-modal="true" aria-labelledby="gmMusicAddModalTitle">
      <div id="gmMusicAddModalTitle" class="gm-music-modal-title">Додати трек</div>
      <div class="gm-music-modal-grid">
        <input id="gmMusicUrlInput" class="gm-cell-input" type="text" placeholder="Посилання (YouTube / Dropbox / Spotify / mp3 URL)" />
        <input id="gmMusicNameInput" class="gm-cell-input" type="text" placeholder="Назва треку" />
      </div>
      <div class="gm-music-modal-actions">
        <button id="gmMusicCancelAddButton" class="gm-music-btn" type="button">Скасувати</button>
        <button id="gmMusicAddButton" class="gm-characters-create-btn" type="button">
          <i class="fas fa-plus"></i>
          <span>Додати</span>
        </button>
      </div>
    </div>
  </div>
</section>
