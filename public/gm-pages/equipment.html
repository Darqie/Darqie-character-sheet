<section class="gm-characters-page gm-items-page">
	<div class="gm-characters-toolbar">
		<div class="gm-characters-toolbar-title">Спорядження</div>
		<div class="gm-characters-toolbar-actions">
			<select id="gmEquipmentFilterSelect" class="gm-cell-select gm-items-filter-select"></select>
			<button id="gmAddEquipmentButton" class="gm-characters-create-btn" type="button">
				<i class="fas fa-plus"></i>
				<span>Додати спорядження</span>
			</button>
		</div>
	</div>

	<div class="gm-characters-table-wrap">
		<table class="gm-characters-table gm-items-table">
			<colgroup>
				<col style="width: 38%" />
				<col style="width: 12%" />
				<col style="width: 12%" />
				<col style="width: 24%" />
				<col />
			</colgroup>
			<thead>
				<tr>
					<th>Назва</th>
					<th>Броня</th>
					<th>Вага</th>
					<th>Персонаж</th>
					<th>Дії</th>
				</tr>
			</thead>
			<tbody id="gmEquipmentTableBody"></tbody>
		</table>
	</div>

	<div id="gmEquipmentCreateModal" class="gm-item-modal" hidden>
		<div class="gm-item-modal-backdrop" data-action="closeModal"></div>
		<div class="gm-item-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="gmEquipmentCreateModalTitle">
			<h4 id="gmEquipmentCreateModalTitle" class="gm-item-modal-title">Додати спорядження</h4>
			<div class="gm-item-modal-grid">
				<label class="gm-item-modal-label">
					<span>Назва</span>
					<input id="gmEquipmentModalNameInput" class="gm-cell-input" type="text" />
				</label>
				<label class="gm-item-modal-label">
					<span>Броня</span>
					<input id="gmEquipmentModalArmorInput" class="gm-cell-input" type="text" />
				</label>
				<label class="gm-item-modal-label">
					<span>Вага</span>
					<input id="gmEquipmentModalWeightInput" class="gm-cell-input" type="text" />
				</label>
				<label class="gm-item-modal-label">
					<span>Персонаж</span>
					<select id="gmEquipmentModalOwnerSelect" class="gm-cell-select"></select>
				</label>
			</div>
			<div class="gm-item-modal-actions">
				<button id="gmEquipmentModalSaveButton" type="button" class="gm-characters-create-btn">
					<i class="fas fa-check"></i>
					<span>Зберегти</span>
				</button>
				<button id="gmEquipmentModalCancelButton" type="button" class="gm-characters-create-btn gm-characters-create-btn--npc">
					<i class="fas fa-times"></i>
					<span>Скасувати</span>
				</button>
			</div>
		</div>
	</div>
</section>
