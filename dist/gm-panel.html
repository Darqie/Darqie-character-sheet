<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель GM</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 15%, #5b1f1f 0%, #1d1f2a 38%, #12131b 100%);
      color: #e0e0e0;
      font-family: 'Cormorant Unicase', serif;
    }

    .main-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .gm-panel-layout {
      width: min(1200px, 96vw);
    }

    .gm-panel-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .gm-panel-title {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .gm-panel-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .gm-panel-nav-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #e0e0e0;
      font-family: 'Cormorant Unicase', serif;
      font-size: 1.05rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .gm-panel-nav-btn:hover {
      color: #fff;
      transform: translateY(-2px) scale(1.03);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.55));
    }

    .gm-panel-nav-btn:active {
      transform: translateY(0) scale(1.01);
    }

    .gm-panel-shell {
      width: 100%;
      min-height: calc(100vh - 48px);
      border-radius: 12px;
      padding: 24px;
      background: rgba(33, 37, 51, 0.22);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px 0 rgba(0,0,0,0.18), 0 1.5px 6px 0 rgba(0,0,0,0.12);
      box-sizing: border-box;
    }

    .gm-panel-content {
      min-height: 60vh;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
      padding-right: 4px;
    }

    /* === Кастомний вертикальний скролбар у стилі сторінки персонажа === */
    ::-webkit-scrollbar {
      width: 10px;
      background: rgba(0,0,0,0.10);
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(40,40,40,0.22);
      border-radius: 8px;
      box-shadow: 0 2px 8px 0 rgba(0,0,0,0.18);
      border: 2px solid #f0f0f0;
      transition: background 0.2s;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(40,40,40,0.32);
    }
    ::-webkit-scrollbar-corner {
      background: transparent;
    }

    /* Для Firefox */
    html {
      scrollbar-width: thin;
      scrollbar-color: rgba(40,40,40,0.22) rgba(0,0,0,0.10);
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="gm-panel-layout">
      <div class="gm-panel-topbar">
        <h2 class="gm-panel-title">Панель GM</h2>
        <div class="gm-panel-nav">
          <button id="gmPanelBackButton" class="gm-panel-nav-btn" type="button" title="Перейти до персонажів" aria-label="Перейти до персонажів">
            <i class="fas fa-users"></i>
            <span>Гравці</span>
          </button>
          <button id="gmPanelCharactersButton" class="gm-panel-nav-btn" type="button" title="Персонажі" aria-label="Персонажі">
            <i class="fas fa-user-shield"></i>
            <span>Персонажі</span>
          </button>
          <button id="gmPanelItemsButton" class="gm-panel-nav-btn" type="button" title="Предмети" aria-label="Предмети">
            <i class="fas fa-box-open"></i>
            <span>Предмети</span>
          </button>
          <button id="gmPanelSkillsButton" class="gm-panel-nav-btn" type="button" title="Навички" aria-label="Навички">
            <i class="fas fa-scroll"></i>
            <span>Навички</span>
          </button>
          <button id="gmPanelWeaponsButton" class="gm-panel-nav-btn" type="button" title="Зброя" aria-label="Зброя">
            <i class="fas fa-crosshairs"></i>
            <span>Зброя</span>
          </button>
        </div>
      </div>

      <div class="gm-panel-shell">

        <div class="gm-panel-content"></div>
      </div>
    </div>
  </div>

  <script src="./gm-panel-page.js"></script>
</body>
</html>
