<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель GM</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 15%, #5b1f1f 0%, #1d1f2a 38%, #12131b 100%);
      color: #e0e0e0;
      font-family: 'Cormorant Unicase', serif;
    }

    .main-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .gm-panel-layout {
      width: min(1200px, 96vw);
    }

    .gm-panel-title {
      margin: 0 0 14px 0;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .gm-panel-shell {
      width: 100%;
      min-height: calc(100vh - 48px);
      border-radius: 12px;
      padding: 24px;
      background: rgba(33, 37, 51, 0.22);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px 0 rgba(0,0,0,0.18), 0 1.5px 6px 0 rgba(0,0,0,0.12);
      box-sizing: border-box;
    }

    .gm-panel-content {
      min-height: 60vh;
      margin-top: 18px;
    }

    .gm-panel-actions {
      margin-top: 24px;
    }

    #gmPanelBackButton {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: none;
      border: none;
      color: #e0e0e0;
      font-family: 'Cormorant Unicase', serif;
      font-size: 1.25em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gmPanelBackButton:hover {
      color: #fff;
      transform: translateY(-2px) scale(1.03);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
    }

    #gmPanelBackButton:active {
      transform: translateY(0) scale(1.01);
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="gm-panel-layout">
      <h2 class="gm-panel-title">Панель GM</h2>

      <div class="gm-panel-shell">

        <div class="gm-panel-content"></div>

        <div class="gm-panel-actions">
          <button id="gmPanelBackButton" type="button" title="Перейти до персонажів" aria-label="Перейти до персонажів">
            <i class="fas fa-users"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="./gm-panel-page.js"></script>
</body>
</html>
