<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Darqie Music Bootstrap</title>
</head>
<body>
  <!--
    This page is the OBR background_url — it stays alive for the entire room session.
    It does NOT play audio itself (background pages never receive user activation,
    so Chrome blocks all autoplay here).

    Instead, music-bg.js opens a persistent OBR popover (music-player.html) which
    *does* receive allow="autoplay" from OBR and can play audio+YouTube+Spotify.
  -->
  <script src="/music-bg.js"></script>
</body>
</html>
