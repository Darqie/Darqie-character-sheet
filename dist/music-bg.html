<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Darqie Music</title>
</head>
<body>
  <!-- Audio player for Dropbox / direct MP3 links -->
  <audio id="bgAudio" preload="none"></audio>

  <!--
    YouTube iframe — real size (320×200) so Chrome grants autoplay permission.
    Positioned off-screen so users don't see a video window.
    OBR grants allow="autoplay" to the background_url iframe, and we delegate
    it further to YouTube here → depth 2 instead of previous depth 3.
  -->
  <iframe
    id="bgYtIframe"
    src=""
    allow="autoplay; encrypted-media; fullscreen"
    allowfullscreen
    style="position:absolute;left:-9999px;top:0;width:320px;height:200px;border:none;">
  </iframe>

  <!-- Spotify hidden embed -->
  <iframe
    id="bgSpotifyIframe"
    src=""
    allow="autoplay; encrypted-media"
    style="position:absolute;left:-9999px;top:0;width:1px;height:1px;border:none;">
  </iframe>

  <script src="/music-bg.js"></script>
</body>
</html>
