<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Darqie Music</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 320px; height: 197px;
      overflow: hidden; background: #000;
    }
    /* YouTube iframe fills the whole popover */
    #ytIframe {
      position: absolute; inset: 0;
      width: 320px; height: 197px;
      border: none; display: none;
    }
    /* Audio track — nothing visible, just plays */
    #audioLabel {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      color: #ccc; font-size: 12px; font-family: sans-serif;
      background: transparent;
    }
    /* Spotify hidden off-screen */
    #spotifyIframe {
      position: absolute; left: -9999px; top: 0;
      width: 1px; height: 1px; border: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/audioPlayer-CfI7DF1T.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/index-Cfa9MU8H.js">
</head>
<body>
  <!-- Static iframe with allow="autoplay" — Chrome delegates the permission down.
       YT postMessage API (enablejsapi=1) is used so we can unMute after load. -->
  <iframe
    id="ytIframe"
    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
    allowfullscreen
  ></iframe>

  <div id="audioLabel">▶ Грає музика…</div>

  <audio id="bgAudio" preload="none" style="display:none;"></audio>

  <iframe
    id="spotifyIframe"
    src=""
    allow="autoplay; encrypted-media"
  ></iframe>

</body>
</html>
