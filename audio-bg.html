<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Darqie Audio BG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1px; height: 1px; overflow: hidden; background: transparent; }
    #ytIframe, #spotifyIframe {
      position: absolute; left: 0; top: 0;
      width: 1px; height: 1px; border: none; display: none;
    }
  </style>
</head>
<body>
  <!-- All media is invisible — audio plays in background via OBR background_url allow="autoplay" -->
  <iframe id="ytIframe" allow="autoplay; encrypted-media"></iframe>
  <audio id="bgAudio" preload="none" style="display:none;"></audio>
  <iframe id="spotifyIframe" src="" allow="autoplay; encrypted-media"></iframe>
  <script type="module" src="/music-bg-entry.js"></script>
</body>
</html>
