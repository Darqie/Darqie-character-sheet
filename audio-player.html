<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Darqie Music Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }
    #spotifyIframe { position: absolute; left: 0; top: 0; width: 1px; height: 1px; border: none; pointer-events: none; }
    #ytIframe {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 320px;
      height: 180px;
      border: none;
      opacity: 0.01;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <audio id="bgAudio" preload="none" style="display:none;"></audio>
  <iframe id="spotifyIframe" src="" allow="autoplay; encrypted-media"></iframe>
  <iframe id="ytIframe" src="" allow="autoplay; encrypted-media; fullscreen"></iframe>
  <script type="module" src="/music-player-entry.js"></script>
</body>
</html>
